<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Impl Rust for ESP32</title>
    <style>
        :root {
            --primary-color: #ff7b3b;
            --secondary-color: #ffd98f;
            --background-gradient: linear-gradient(135deg, #121212 0%, #0a0a0a 50%, rgba(45, 13, 19, 0.5) 150%);
            --card-background: rgba(24, 22, 23, 0.9);
            --text-color: #ecf0f1;
            --accent-color: #ff9b5b;
            --header-background: #121212;
            --header-text-gradient: linear-gradient(45.52deg, rgb(255, 123, 59) -7.27%, rgba(55, 17, 43, 0.85) 208.87%);
            --shadow-color: rgba(0, 0, 0, 0.2);
        }

        body {
            font-family: 'Arial', sans-serif;
            background: var(--background-gradient);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            padding: 2rem 1rem;
            text-align: center;
            color: #fff;
            box-shadow: 0 6px 12px var(--shadow-color);
            margin: 0 auto;
            max-width: 1200px;
        }

        nav {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            background: linear-gradient(105deg, #2b2b2b 0%, #121212 100%);
            padding: 0.75rem 0;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 8px var(--shadow-color);
        }

        nav a {
            color: #f0f0f0;
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: bold;
            letter-spacing: 0.5px;
            transition: color 0.3s ease, transform 0.3s ease;
        }

        nav a:hover {
            color: var(--primary-color);
            transform: scale(1.1);
        }

        main {
            flex: 1;
            padding: 1rem;
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            align-items: start;
            justify-content: center;
        }

        section {
            background: var(--card-background);
            border-radius: 1rem;
            padding: 1.25rem;
            box-shadow: 0 8px 16px var(--shadow-color);
            transition: box-shadow 0.3s ease;
            max-width: 100%;
            margin: 0 auto;
        }

        section:hover {
            box-shadow: 0 12px 24px var(--shadow-color);
        }

        section h2 {
            margin-top: 0;
            color: var(--accent-color);
            font-size: 1.5rem;
        }

        ul {
            list-style: none;
            padding: 0;
            margin: 1.25rem 0;
        }

        ul li {
            text-align: left;
            padding-left: 1.25rem;
            margin-bottom: 0.625rem;
            position: relative;
        }

        ul li::before {
            content: '\2713';
            color: var(--accent-color);
            position: absolute;
            left: 0;
            top: 0;
        }

        footer {
            background: var(--header-background);
            color: #fff;
            text-align: center;
            padding: 1.25rem;
            margin-top: auto;
            box-shadow: 0 -6px 12px var(--shadow-color);
        }

        footer p {
            margin: 0;
            font-size: 0.9rem;
        }

        .rust-logo {
            width: 5rem;
            margin: 1rem auto;
        }

        img.embedded-diagram {
            border-radius: 0.75rem;
            border: 0.25rem solid var(--accent-color);
            max-width: 100%;
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 2rem;
            }

            nav {
                flex-direction: column;
                gap: 0.5rem;
                padding: 0.5rem;
            }

            nav a {
                font-size: 1rem;
            }

            main {
                grid-template-columns: 1fr;
            }

            section {
                padding: 1rem;
            }

            section h2 {
                font-size: 1.25rem;
            }

            ul li {
                font-size: 0.9rem;
            }
        }

        @media (max-width: 480px) {
            header h1 {
                font-size: 1.5rem;
            }

            nav a {
                font-size: 0.9rem;
            }

            section h2 {
                font-size: 1rem;
            }

            ul li {
                font-size: 0.8rem;
            }
        }
    </style>
</head>

        </svg>
        <h1>Hello!</h1>
    </header>
    <main>
        <form method="post" style="display: flex; flex-flow: column nowrap; align-items: center;">
            <label>a: <input name="a" type="number"></label>
            <label>b: <input name="b" type="text"></label>
            <input type="submit">
        </form>
    </main>
    <footer>
        <p>&copy; 2025 Impl Rust for ESP32</p>
